<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eagler UB</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

/* =========================
   TOP BAR
========================= */

#topbar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:rgba(10,10,10,0.95);
    border-bottom:2px solid cyan;
    z-index:1000;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;
    box-sizing:border-box;
}

#logo{
    color:cyan;
    font-size:32px;
    font-weight:bold;
    text-shadow:0 0 15px cyan;
}

#nav{
    display:flex;
    gap:20px;
}

.navBtn{
    color:white;
    cursor:pointer;
    transition:0.2s;
}

.navBtn:hover{
    color:cyan;
}

/* =========================
   GAME FRAME
========================= */

iframe{
    position:absolute;
    top:60px;
    left:0;
    width:100%;
    height:calc(100% - 60px);
    border:none;
}

/* =========================
   HUD
========================= */

#hud{
    position:absolute;
    top:80px;
    left:15px;
    z-index:999;
}

.hudBox{
    background:rgba(0,0,0,0.6);
    border:1px solid cyan;
    border-radius:12px;
    padding:10px;
    color:white;
    margin-bottom:5px;
    box-shadow:0 0 10px cyan;
}

/* =========================
   CLICK GUI
========================= */

#clickgui{

    position:absolute;

    top:120px;
    left:120px;

    width:400px;

    background:rgba(15,15,15,0.96);

    border:2px solid cyan;

    border-radius:14px;

    display:none;

    z-index:1001;

    animation:popIn 0.2s ease;
}

#guiHeader{
    padding:18px;
    color:cyan;
    font-size:24px;
    border-bottom:1px solid cyan;
    cursor:move;
}

.module{
    padding:16px;
    border-bottom:1px solid #222;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

.module:hover{
    background:rgba(0,255,255,0.12);
}

.enabled{
    color:lime;
}

.disabled{
    color:red;
}

/* =========================
   CAPE
========================= */

#cape{
    position:absolute;
    right:20px;
    bottom:20px;
    width:100px;
    height:150px;

    background:linear-gradient(red,darkred);

    border:2px solid white;

    z-index:1000;

    animation:capeWave 2s infinite alternate;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes popIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes capeWave{
    from{
        transform:rotate(-3deg);
    }
    to{
        transform:rotate(3deg);
    }
}

</style>
</head>

<body>

<!-- =========================
     TOPBAR
========================= -->

<div id="topbar">

    <div id="logo">
        Eagler UB
    </div>

    <div id="nav">

        <div class="navBtn">Home</div>
        <div class="navBtn">Servers</div>
        <div class="navBtn">Mods</div>
        <div class="navBtn">Settings</div>

    </div>

</div>

<!-- =========================
     HUD
========================= -->

<div id="hud">

    <div class="hudBox">
        Eagler UB v1.0
    </div>

    <div class="hudBox" id="fps">
        FPS: 144
    </div>

    <div class="hudBox">
        XYZ: 120 64 -42
    </div>

</div>

<!-- =========================
     CLICK GUI
========================= -->

<div id="clickgui">

    <div id="guiHeader">
        Eagler UB ClickGUI
    </div>

    <div class="module enabled">Fly</div>
    <div class="module enabled">Fullbright</div>
    <div class="module disabled">ESP</div>
    <div class="module enabled">Xray</div>
    <div class="module disabled">KillAura</div>
    <div class="module enabled">AutoSprint</div>
    <div class="module enabled">NoFall</div>

</div>

<!-- =========================
     CUSTOM CAPE
========================= -->

<div id="cape"></div>

<!-- =========================
     EAGLERCRAFT
========================= -->

<iframe src="client/eaglercraftX.html"></iframe>

<script>

/* =========================
   FPS COUNTER
========================= */

setInterval(() => {

    let fps = Math.floor(Math.random()*50)+120;

    document.getElementById("fps").innerText =
        "FPS: " + fps;

},1000);

/* =========================
   CLICK GUI TOGGLE
========================= */

const gui = document.getElementById("clickgui");

let guiOpen = false;

document.addEventListener("keydown",(e)=>{

    if(e.key.toLowerCase() === "r"){

        guiOpen = !guiOpen;

        gui.style.display =
            guiOpen ? "block" : "none";
    }

});

/* =========================
   DRAGGABLE GUI
========================= */

let dragging = false;

let offsetX = 0;
let offsetY = 0;

const header =
    document.getElementById("guiHeader");

header.addEventListener("mousedown",(e)=>{

    dragging = true;

    offsetX = e.clientX - gui.offsetLeft;
    offsetY = e.clientY - gui.offsetTop;

});

document.addEventListener("mouseup",()=>{

    dragging = false;

});

document.addEventListener("mousemove",(e)=>{

    if(dragging){

        gui.style.left =
            (e.clientX-offsetX)+"px";

        gui.style.top =
            (e.clientY-offsetY)+"px";
    }

});

/* =========================
   MODULE TOGGLE
========================= */

document.querySelectorAll(".module")
.forEach(mod=>{

    mod.addEventListener("click",()=>{

        if(mod.classList.contains("enabled")){

            mod.classList.remove("enabled");
            mod.classList.add("disabled");

        }else{

            mod.classList.remove("disabled");
            mod.classList.add("enabled");

        }

    });

});

</script>

</body>
</html>
